name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  LIBQRENCODE_VERSION: "4.1.1"

jobs:
  build-linux:
    name: build-${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: amd64
            platform: linux/amd64
            artifact: qrencode-linux-amd64
          - name: 386
            platform: linux/386
            artifact: qrencode-linux-386
          - name: arm64
            platform: linux/arm64
            artifact: qrencode-linux-arm64
          - name: armv7
            platform: linux/arm/v7
            artifact: qrencode-linux-armv7
          - name: armv6
            platform: linux/arm/v6
            artifact: qrencode-linux-armv6
          - name: ppc64le
            platform: linux/ppc64le
            artifact: qrencode-linux-ppc64le
          - name: s390x
            platform: linux/s390x
            artifact: qrencode-linux-s390x
          - name: riscv64
            platform: linux/riscv64
            artifact: qrencode-linux-riscv64

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Build static binary in Alpine container
        run: |
          docker run --rm \
            --platform "${{ matrix.platform }}" \
            -e LIBQRENCODE_VERSION="${LIBQRENCODE_VERSION}" \
            -e TARGET="${{ matrix.artifact }}" \
            -v "${PWD}:/work" \
            -w /work \
            alpine:3.22 \
            sh -euxc '
              apk add --no-cache build-base cmake pkgconf autoconf automake libtool curl file binutils
              curl -fL "https://github.com/fukuchi/libqrencode/archive/refs/tags/v${LIBQRENCODE_VERSION}.tar.gz" -o /tmp/libqrencode.tar.gz
              mkdir -p /tmp/libqrencode-src /tmp/libqrencode-build /opt/libqrencode-static
              tar -xzf /tmp/libqrencode.tar.gz -C /tmp/libqrencode-src --strip-components=1
              cd /tmp/libqrencode-src
              ./autogen.sh
              ./configure --prefix=/opt/libqrencode-static --without-tools --disable-shared --enable-static
              make -j"$(getconf _NPROCESSORS_ONLN)"
              make install
              cd /work
              make clean || true
              PKG_CONFIG_PATH=/opt/libqrencode-static/lib/pkgconfig make STATIC=1 TARGET="${TARGET}"
              file "${TARGET}"
              if readelf -l "${TARGET}" | grep -q "interpreter"; then
                echo "ERROR: ${TARGET} is still dynamically linked"
                readelf -l "${TARGET}"
                exit 1
              fi
              ldd "${TARGET}" || true
            '

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-linux
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          pattern: qrencode-linux-*
          merge-multiple: true

      - name: Show artifacts
        run: |
          chmod +x qrencode-linux-* || true
          ls -lah
          file qrencode-linux-* || true

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" qrencode-linux-* --repo "$REPO" --clobber
          else
            gh release create "$TAG" qrencode-linux-* --repo "$REPO" --generate-notes
          fi
