name: Build Linux ARM64

on:
  push:
    paths:
      - "**/*.c"
      - ".github/workflows/build-linux-arm64.yml"
  workflow_dispatch:
    inputs:
      reason:
        description: '手动触发编译的原因'
        required: false
        default: '手动构建最新 ARM64 静态版'

jobs:
  build-linux-arm64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Verified Aarch64 Cross Compiler
        run: |
          # 1. 更新标准宿主机源（100% 不会 404）
          sudo apt-get update
          
          # 2. 安装 Ubuntu 官方源里经过长期验证的 standard 交叉编译器
          # 这样直接避开了任何第三方网站下载工具链带来的网络断线和解压格式问题
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build static ARM64 Binary
        run: |
          # 1. 显式指定跨平台交叉编译器 aarch64-linux-gnu-gcc
          # 2. 结合 -static、-pthread 进行纯静态闭环编译
          # 3. 末尾加上 -lresolv 以完美补齐 cfnat_linux.c 中的 DNS 符号（如 res_ninit / ns_initparse 等）
          aarch64-linux-gnu-gcc -static -pthread -O2 -Wall -Wextra \
            cfnat_linux.c \
            -o cfnat-linux-arm64 \
            -lresolv

      - name: Verify Binary Architecture
        run: |
          # 验证生成的二进制文件是否为真正的静态 ARM64 架构
          file cfnat-linux-arm64
          ls -lh cfnat-linux-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cfnat-linux-arm64
          path: cfnat-linux-arm64
