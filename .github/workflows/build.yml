name: Build Linux ARM64

on:
  push:
    paths:
      - "**/*.c"
      - ".github/workflows/build-linux-arm64.yml"
  workflow_dispatch:
    inputs:
      reason:
        description: '手动触发编译的原因'
        required: false
        default: '手动构建最新 ARM64 静态版'

jobs:
  build-linux-arm64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ARM64 cross compiler and musl environment
        run: |
          # 1. 核心修复：添加 arm64 架构支持，否则 apt 找不到 :arm64 后缀的包
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          
          # 2. 安装交叉编译器以及跨平台 musl 依赖
          sudo apt-get install -y crossbuild-essential-arm64 musl-tools musl-dev:arm64

      - name: Build static ARM64 with musl
        run: |
          # 动态查找 Ubuntu 系统中实际的 musl-gcc.specs 路径并完成编译
          SPECS_PATH=$(find /usr -name "musl-gcc.specs" 2>/dev/null | head -n 1)
          if [ -z "$SPECS_PATH" ]; then
            echo "未找到 musl-gcc.specs，尝试使用常规静态编译..."
            aarch64-linux-gnu-gcc -static -pthread -O2 -Wall -Wextra cfnat_linux.c -o cfnat-linux-arm64 -lresolv
          else
            echo "找到 specs 文件路径: $SPECS_PATH"
            aarch64-linux-gnu-gcc -specs="$SPECS_PATH" -static -pthread -O2 -Wall -Wextra \
              cfnat_linux.c \
              -o cfnat-linux-arm64 \
              -lresolv
          fi

      - name: Check binary
        run: |
          file cfnat-linux-arm64
          ls -lh cfnat-linux-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cfnat-linux-arm64
          path: cfnat-linux-arm64
