name: Build Linux ARM64

on:
  push:
    paths:
      - "**/*.c"
      - ".github/workflows/build-linux-arm64.yml"
  workflow_dispatch:
    inputs:
      reason:
        description: '手动触发编译的原因'
        required: false
        default: '手动构建最新 ARM64 静态版'

jobs:
  build-linux-arm64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ARM64 Cross Toolchain and Musl
        run: |
          sudo apt-get update
          # 👇 核心修复：
          # 1. 移除了会导致 404 的 dpkg --add-architecture arm64 
          # 2. 安装专为 amd64 环境打造的 arm64-cross musl 库，绝不报错
          sudo apt-get install -y crossbuild-essential-arm64 musl-tools musl-dev-arm64-cross

      - name: Build static ARM64 with musl
        run: |
          # 1. 动态查找系统中的 musl-gcc.specs 路径
          SPECS_PATH=$(find /usr -name "musl-gcc.specs" 2>/dev/null | head -n 1)
          
          # 2. 显式指定 aarch64-linux-gnu 的 musl 头文件与库文件搜索路径进行完美纯静态编译
          # 3. 末尾补充 -lresolv 完美消除 cfnat_linux.c 里的高级 DNS 函数符号引用报错
          if [ -z "$SPECS_PATH" ]; then
            echo "未找到 specs 模板，使用原生交叉静态编译..."
            aarch64-linux-gnu-gcc -static -pthread -O2 -Wall -Wextra cfnat_linux.c -o cfnat-linux-arm64 -lresolv
          else
            echo "找到 specs 文件路径: $SPECS_PATH"
            aarch64-linux-gnu-gcc -specs="$SPECS_PATH" -static -pthread -O2 -Wall -Wextra \
              -I/usr/aarch64-linux-gnu/include \
              cfnat_linux.c \
              -o cfnat-linux-arm64 \
              -lresolv
          fi

      - name: Check binary
        run: |
          file cfnat-linux-arm64
          ls -lh cfnat-linux-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cfnat-linux-arm64
          path: cfnat-linux-arm64
