name: Build Linux ARM64

on:
  push:
    paths:
      - "**/*.c"
      - ".github/workflows/build-linux-arm64.yml"
  workflow_dispatch:
    inputs:
      reason:
        description: '手动触发编译的原因'
        required: false
        default: '手动构建最新 ARM64 静态版'

jobs:
  build-linux-arm64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download and Setup Aarch64 Musl Toolchain (Fast & Stable Mirror)
        run: |
          # 👇 核心修复：改用 GitHub 官方 Release 托管的稳定专用交叉编译链，再也不会出现超时 404/28 错误
          curl -L "https://github.com/fscarmen/musl-cross-make/releases/download/cross-compilers/aarch64-linux-musl-cross.tgz" -o musl-cross.tgz || \
          curl -L "https://bootlin.com/pub/toolchains/arm64/tarballs/aarch64-custom-musl-stable-2023.11-1.tar.xz" -o musl-cross.tgz
          
          # 解压工具链
          tar -xzf musl-cross.tgz
          
          # 自动化识别解压出来的 bin 目录并注入系统 PATH 中
          BIN_PATH=$(find $(pwd) -type d -name "bin" | head -n 1)
          echo "$BIN_PATH" >> $GITHUB_PATH

      - name: Build static ARM64 with pure Musl-GCC
        run: |
          # 自动匹配编译器名称（可能是 aarch64-linux-musl-gcc 或者是 aarch64-buildroot-linux-musl-gcc）
          COMPILER=$(COMPILER=$(find . -name "*musl-gcc" -type f -exec basename {} \;) && echo ${COMPILER%%-*}-linux-musl-gcc)
          if ! command -v $COMPILER &> /dev/null; then
            COMPILER=$(find . -name "*musl-gcc" -type f -exec basename {} \;)
          fi
          
          echo "使用编译器: $COMPILER"
          
          # 1. 结合 -static、-pthread、-O2 进行纯静态编译
          # 2. 末尾补充 -lresolv 完美消除 cfnat_linux.c 里的高级 DNS 函数符号引用报错
          $COMPILER -static -pthread -O2 -Wall -Wextra \
            cfnat_linux.c \
            -o cfnat-linux-arm64 \
            -lresolv

      - name: Check binary
        run: |
          file cfnat-linux-arm64
          ls -lh cfnat-linux-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cfnat-linux-arm64
          path: cfnat-linux-arm64
