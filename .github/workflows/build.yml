name: Build Linux ARM64

on:
  push:
    paths:
      - "**/*.c"
      - ".github/workflows/build-linux-arm64.yml"
  workflow_dispatch:
    inputs:
      reason:
        description: '手动触发编译的原因'
        required: false
        default: '手动构建最新 ARM64 静态版'

jobs:
  build-linux-arm64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download and Setup Aarch64 Musl Toolchain
        run: |
          # 1. 下载预编译好的、稳定的专用 aarch64-linux-musl 交叉编译工具链
          # 该工具链天生自带完美的静态库与 specs 文件，无需通过 apt 零散安装
          curl -L "https://musl.cc/aarch64-linux-musl-cross.tgz" -o musl-cross.tgz
          tar -xzf musl-cross.tgz
          
          # 2. 将工具链的 bin 目录写入 GitHub Actions 环境的 PATH 中
          echo "$(pwd)/aarch64-linux-musl-cross/bin" >> $GITHUB_PATH

      - name: Build static ARM64 with pure Musl-GCC
        run: |
          # 1. 直接调用专用的 musl-gcc，它本身就是闭环环境，不需要再通过 -specs 参数去找文件
          # 2. 加上 -static、-pthread、-O2 等参数进行纯静态单文件编译
          # 3. 末尾加上 -lresolv 完美补齐 cfnat_linux.c 内部的高级 DNS 函数符号
          aarch64-linux-musl-gcc -static -pthread -O2 -Wall -Wextra \
            cfnat_linux.c \
            -o cfnat-linux-arm64 \
            -lresolv

      - name: Check binary
        run: |
          file cfnat-linux-arm64
          ls -lh cfnat-linux-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cfnat-linux-arm64
          path: cfnat-linux-arm64
