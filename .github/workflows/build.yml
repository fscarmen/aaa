name: Build Linux ARM64

on:
  push:
    paths:
      - "**/*.c"
      - ".github/workflows/build-linux-arm64.yml"
  workflow_dispatch:

jobs:
  build-linux-arm64:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ARM64 compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build static ARM64
        run: |
          aarch64-linux-gnu-gcc -static -pthread -O2 -Wall -Wextra \
            cfnat_linux_ipmode.c \
            -o cfnat_linux_arm64

      - name: Check binary
        run: |
          file cfnat_linux_arm64
          ls -lh cfnat_linux_arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cfnat_linux_arm64
          path: cfnat_linux_arm64
