name: Build Linux ARM64

on:
  push:
    paths:
      - "**/*.c"
      - ".github/workflows/build-linux-arm64.yml"
  workflow_dispatch:

jobs:
  build-linux-arm64:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install ARM64 compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build static ARM64
        run: |
          aarch64-linux-gnu-gcc -static -pthread -O2 -Wall -Wextra \
            cfnat_linux.c \
            -o cfnat-linux-arm64

      - name: Check binary
        run: |
          file cfnat-linux-arm64
          ls -lh cfnat-linux-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: cfnat-linux-arm64
          path: cfnat-linux-arm64
