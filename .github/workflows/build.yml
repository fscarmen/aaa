name: Build Linux ARM64

on:
  push:
    paths:
      - "**/*.c"
      - ".github/workflows/build-linux-arm64.yml"
  workflow_dispatch:

jobs:
  build-linux-arm64:
    runs-on: ubuntu-latest

  steps:
    - uses: actions/checkout@v4 # 提示：目前稳定版推荐 v4

    - name: Install ARM64 musl compiler
      run: |
        sudo apt-get update
        # 安装 crossbuild 基础环境以及 arm64 的 musl 工具链
        sudo apt-get install -y crossbuild-essential-arm64 musl-tools

    - name: Build static ARM64 with musl
      run: |
        # 使用 aarch64-linux-gnu-musl-gcc (或者是通过 musl-gcc 包装)
        # 注意末尾必须加上 -lresolv 补全 DNS 库符号
        aarch64-linux-gnu-gcc -specs=/usr/share/musl/musl-gcc.specs -static -pthread -O2 -Wall -Wextra \
          cfnat_linux.c \
          -o cfnat-linux-arm64 \
          -lresolv

    - name: Check binary
      run: |
        file cfnat-linux-arm64
        ls -lh cfnat-linux-arm64

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: cfnat-linux-arm64
        path: cfnat-linux-arm64
