name: Build better-cf-ip-c

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "选择要编译的版本"
        required: true
        default: "linux-amd64"
        type: choice
        options:
          - linux-amd64
          - macos-amd64
          - macos-arm64
          - windows-amd64
          - windows-386
          - all-supported

permissions:
  contents: write

jobs:
  build-linux:
    name: Build linux-amd64
    if: ${{ github.event_name == 'push' || inputs.target == 'linux-amd64' || inputs.target == 'all-supported' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libcurl4-openssl-dev libssl-dev file ca-certificates
      - name: Build
        run: |
          ./scripts/build.sh linux-amd64
          file dist/better-cf-ip-c-linux-amd64
      - uses: actions/upload-artifact@v4
        with:
          name: better-cf-ip-c-linux-amd64
          path: dist/better-cf-ip-c-linux-amd64
          if-no-files-found: error

  build-macos:
    name: Build ${{ matrix.target }}
    if: ${{ github.event_name == 'push' || inputs.target == 'macos-amd64' || inputs.target == 'macos-arm64' || inputs.target == 'all-supported' }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-amd64
            arch: x86_64
          - target: macos-arm64
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - name: Skip unmatched target
        if: ${{ github.event_name != 'push' && inputs.target != matrix.target && inputs.target != 'all-supported' }}
        run: echo "skip ${{ matrix.target }}"
      - name: Install dependencies
        if: ${{ github.event_name == 'push' || inputs.target == matrix.target || inputs.target == 'all-supported' }}
        run: |
          brew install pkg-config openssl@3 curl
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig:$(brew --prefix curl)/lib/pkgconfig:$PKG_CONFIG_PATH" >> "$GITHUB_ENV"
      - name: Build
        if: ${{ github.event_name == 'push' || inputs.target == matrix.target || inputs.target == 'all-supported' }}
        run: |
          ./scripts/build.sh ${{ matrix.target }}
          file dist/better-cf-ip-c-${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        if: ${{ github.event_name == 'push' || inputs.target == matrix.target || inputs.target == 'all-supported' }}
        with:
          name: better-cf-ip-c-${{ matrix.target }}
          path: dist/better-cf-ip-c-${{ matrix.target }}
          if-no-files-found: error

  build-windows:
    name: Build ${{ matrix.target }}
    if: ${{ github.event_name == 'push' || inputs.target == 'windows-amd64' || inputs.target == 'windows-386' || inputs.target == 'all-supported' }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-amd64
            msystem: MINGW64
            package_prefix: mingw-w64-x86_64
          - target: windows-386
            msystem: MINGW32
            package_prefix: mingw-w64-i686
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            base-devel
            ${{ matrix.package_prefix }}-gcc
            ${{ matrix.package_prefix }}-pkgconf
            ${{ matrix.package_prefix }}-curl
            ${{ matrix.package_prefix }}-openssl
            ${{ matrix.package_prefix }}-winpthreads
      - name: Build
        if: ${{ github.event_name == 'push' || inputs.target == matrix.target || inputs.target == 'all-supported' }}
        run: |
          ./scripts/build.sh ${{ matrix.target }}
          file dist/better-cf-ip-c-${{ matrix.target }}.exe
      - uses: actions/upload-artifact@v4
        if: ${{ github.event_name == 'push' || inputs.target == matrix.target || inputs.target == 'all-supported' }}
        with:
          name: better-cf-ip-c-${{ matrix.target }}
          path: dist/better-cf-ip-c-${{ matrix.target }}.exe
          if-no-files-found: error

  release:
    name: Publish release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Assemble package
        run: |
          set -euo pipefail
          mkdir -p release package/bin
          find artifacts -type f -maxdepth 3 -print0 | while IFS= read -r -d '' file; do
            name="$(basename "$file")"
            cp "$file" "release/$name"
            cp "$file" "package/bin/$name"
          done
          cp better_cf_ip.c Makefile README.md package/
          cp -r scripts package/
          [ -f locations.json ] && cp locations.json package/
          (cd package && zip -r ../release/better-cf-ip-c-release.zip .)
          (cd release && sha256sum * > sha256sums.txt)
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
