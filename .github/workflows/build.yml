name: Build better-cf-ip-c

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Choose build target"
        required: true
        default: "linux-amd64"
        type: choice
        options:
          - linux-amd64
          - linux-arm64
          - linux-amd64-musl
          - linux-arm64-musl
          - macos-amd64
          - macos-arm64
          - windows-amd64
          - windows-386
          - windows-arm64
          - all-linux
          - all-linux-musl
          - all-macos
          - all-windows
          - all-supported

permissions:
  contents: write

env:
  APP_NAME: better-cf-ip-c
  SRC_FILE: better_cf_ip.c

jobs:
  build-linux-amd64:
    name: Build linux-amd64
    if: ${{ github.event_name == 'push' || inputs.target == 'linux-amd64' || inputs.target == 'all-linux' || inputs.target == 'all-supported' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libcurl4-openssl-dev \
            libssl-dev \
            file \
            ca-certificates

      - name: Build linux-amd64
        run: |
          set -euo pipefail
          mkdir -p dist
          cc -O2 -pipe -std=c11 \
            -Wall -Wextra -Wno-unused-parameter \
            "$SRC_FILE" \
            -o "dist/$APP_NAME-linux-amd64" \
            $(pkg-config --cflags --libs libcurl openssl) \
            -pthread
          chmod +x "dist/$APP_NAME-linux-amd64"
          file "dist/$APP_NAME-linux-amd64"

      - uses: actions/upload-artifact@v4
        with:
          name: better-cf-ip-c-linux-amd64
          path: dist/better-cf-ip-c-linux-amd64
          if-no-files-found: error

  build-linux-docker:
    name: Build ${{ matrix.target }}
    if: ${{ github.event_name == 'push' || inputs.target == 'linux-arm64' || inputs.target == 'linux-amd64-musl' || inputs.target == 'linux-arm64-musl' || inputs.target == 'all-linux' || inputs.target == 'all-linux-musl' || inputs.target == 'all-supported' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-arm64
            selector: linux-arm64
            group: all-linux
            platform: linux/arm64
            image: ubuntu:24.04
            shell: bash
            install: apt-get update && apt-get install -y --no-install-recommends build-essential pkg-config libcurl4-openssl-dev libssl-dev file ca-certificates
            output: better-cf-ip-c-linux-arm64
            command: cc -O2 -pipe -std=c11 -Wall -Wextra -Wno-unused-parameter better_cf_ip.c -o dist/better-cf-ip-c-linux-arm64 $(pkg-config --cflags --libs libcurl openssl) -pthread
          - target: linux-amd64-musl
            selector: linux-amd64-musl
            group: all-linux-musl
            platform: linux/amd64
            image: alpine:3.20
            shell: sh
            install: apk add --no-cache build-base pkgconf curl-dev openssl-dev linux-headers file ca-certificates
            output: better-cf-ip-c-linux-amd64-musl
            command: cc -O2 -pipe -std=c11 -Wall -Wextra -Wno-unused-parameter better_cf_ip.c -o dist/better-cf-ip-c-linux-amd64-musl $(pkg-config --cflags --libs libcurl openssl) -pthread
          - target: linux-arm64-musl
            selector: linux-arm64-musl
            group: all-linux-musl
            platform: linux/arm64
            image: alpine:3.20
            shell: sh
            install: apk add --no-cache build-base pkgconf curl-dev openssl-dev linux-headers file ca-certificates
            output: better-cf-ip-c-linux-arm64-musl
            command: cc -O2 -pipe -std=c11 -Wall -Wextra -Wno-unused-parameter better_cf_ip.c -o dist/better-cf-ip-c-linux-arm64-musl $(pkg-config --cflags --libs libcurl openssl) -pthread
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        if: ${{ matrix.platform == 'linux/arm64' }}

      - name: Build ${{ matrix.target }} in container
        if: ${{ github.event_name == 'push' || inputs.target == matrix.selector || inputs.target == matrix.group || inputs.target == 'all-linux' || inputs.target == 'all-supported' }}
        run: |
          set -euo pipefail
          mkdir -p dist
          docker run --rm \
            --platform "${{ matrix.platform }}" \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -v "$PWD:/work" \
            -w /work \
            "${{ matrix.image }}" \
            ${{ matrix.shell }} -lc '${{ matrix.install }} && mkdir -p dist && ${{ matrix.command }} && file dist/${{ matrix.output }} && chown -R "$HOST_UID:$HOST_GID" dist'
          chmod +x "dist/${{ matrix.output }}"

      - uses: actions/upload-artifact@v4
        if: ${{ github.event_name == 'push' || inputs.target == matrix.selector || inputs.target == matrix.group || inputs.target == 'all-linux' || inputs.target == 'all-supported' }}
        with:
          name: better-cf-ip-c-${{ matrix.target }}
          path: dist/${{ matrix.output }}
          if-no-files-found: error

  build-macos:
    name: Build ${{ matrix.target }}
    if: ${{ github.event_name == 'push' || inputs.target == 'macos-amd64' || inputs.target == 'macos-arm64' || inputs.target == 'all-macos' || inputs.target == 'all-supported' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-amd64
            runner: macos-15-intel
            arch: x86_64
            minver: "10.13"
          - target: macos-arm64
            runner: macos-15
            arch: arm64
            minver: "11.0"
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        if: ${{ github.event_name == 'push' || inputs.target == matrix.target || inputs.target == 'all-macos' || inputs.target == 'all-supported' }}
        run: |
          set -euo pipefail
          brew install pkg-config openssl@3 curl || true
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig:$(brew --prefix curl)/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"

      - name: Build ${{ matrix.target }}
        if: ${{ github.event_name == 'push' || inputs.target == matrix.target || inputs.target == 'all-macos' || inputs.target == 'all-supported' }}
        run: |
          set -euo pipefail
          mkdir -p dist
          clang -O2 -pipe -std=c11 \
            -Wall -Wextra -Wno-unused-parameter \
            -arch "${{ matrix.arch }}" \
            -mmacosx-version-min="${{ matrix.minver }}" \
            "$SRC_FILE" \
            -o "dist/$APP_NAME-${{ matrix.target }}" \
            $(pkg-config --cflags --libs libcurl openssl) \
            -pthread
          strip "dist/$APP_NAME-${{ matrix.target }}" 2>/dev/null || true
          chmod +x "dist/$APP_NAME-${{ matrix.target }}"
          file "dist/$APP_NAME-${{ matrix.target }}"

      - uses: actions/upload-artifact@v4
        if: ${{ github.event_name == 'push' || inputs.target == matrix.target || inputs.target == 'all-macos' || inputs.target == 'all-supported' }}
        with:
          name: better-cf-ip-c-${{ matrix.target }}
          path: dist/better-cf-ip-c-${{ matrix.target }}
          if-no-files-found: error

  build-windows-x86:
    name: Build ${{ matrix.target }}
    if: ${{ github.event_name == 'push' || inputs.target == 'windows-amd64' || inputs.target == 'windows-386' || inputs.target == 'all-windows' || inputs.target == 'all-supported' }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-amd64
            msystem: MINGW64
            package_prefix: mingw-w64-x86_64
            cc: gcc
            winver: "0x0601"
          - target: windows-386
            msystem: MINGW32
            package_prefix: mingw-w64-i686
            cc: gcc
            winver: "0x0601"
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            base-devel
            ${{ matrix.package_prefix }}-${{ matrix.cc }}
            ${{ matrix.package_prefix }}-pkgconf
            ${{ matrix.package_prefix }}-curl
            ${{ matrix.package_prefix }}-openssl
            ${{ matrix.package_prefix }}-winpthreads
            file

      - name: Build ${{ matrix.target }}
        if: ${{ github.event_name == 'push' || inputs.target == matrix.target || inputs.target == 'all-windows' || inputs.target == 'all-supported' }}
        run: |
          set -euo pipefail
          mkdir -p dist
          export PKG_CONFIG="pkg-config --static"
          WIN_CFLAGS="$($PKG_CONFIG --cflags libcurl openssl)"
          WIN_LIBS="$($PKG_CONFIG --libs libcurl openssl)"
          echo "WIN_CFLAGS=$WIN_CFLAGS"
          echo "WIN_LIBS=$WIN_LIBS"
          ${{ matrix.cc }} -O2 -pipe -std=c11 \
            -DWINVER=${{ matrix.winver }} \
            -D_WIN32_WINNT=${{ matrix.winver }} \
            -DCURL_STATICLIB \
            -finput-charset=UTF-8 \
            -fexec-charset=UTF-8 \
            -Wall -Wextra -Wno-unused-parameter \
            $WIN_CFLAGS \
            "$SRC_FILE" \
            -o "dist/$APP_NAME-${{ matrix.target }}.exe" \
            $WIN_LIBS \
            -lws2_32 -lcrypt32 -lbcrypt -lwinpthread \
            -static -s
          file "dist/$APP_NAME-${{ matrix.target }}.exe"

      - uses: actions/upload-artifact@v4
        if: ${{ github.event_name == 'push' || inputs.target == matrix.target || inputs.target == 'all-windows' || inputs.target == 'all-supported' }}
        with:
          name: better-cf-ip-c-${{ matrix.target }}
          path: dist/better-cf-ip-c-${{ matrix.target }}.exe
          if-no-files-found: error

  build-windows-arm64:
    name: Build windows-arm64
    if: ${{ github.event_name == 'push' || inputs.target == 'windows-arm64' || inputs.target == 'all-windows' || inputs.target == 'all-supported' }}
    runs-on: windows-2022
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >-
            base-devel
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-lld
            mingw-w64-clang-x86_64-pkgconf
            mingw-w64-clang-aarch64-headers
            mingw-w64-clang-aarch64-crt
            mingw-w64-clang-aarch64-compiler-rt
            mingw-w64-clang-aarch64-libunwind
            mingw-w64-clang-aarch64-winpthreads
            mingw-w64-clang-aarch64-curl
            mingw-w64-clang-aarch64-openssl
            file

      - name: Build windows-arm64 by cross clang
        run: |
          set -euo pipefail
          mkdir -p dist

          export TARGET_TRIPLE="aarch64-w64-windows-gnu"
          export TARGET_SYSROOT="/clangarm64"
          export PKG_CONFIG="/clang64/bin/pkg-config"
          export PKG_CONFIG_LIBDIR="$TARGET_SYSROOT/lib/pkgconfig"
          export PKG_CONFIG_PATH=""
          export PKG_CONFIG_SYSROOT_DIR=""

          WIN_CFLAGS="$($PKG_CONFIG --static --cflags libcurl openssl)"
          WIN_LIBS="$($PKG_CONFIG --static --libs libcurl openssl)"
          echo "WIN_CFLAGS=$WIN_CFLAGS"
          echo "WIN_LIBS=$WIN_LIBS"

          /clang64/bin/clang -O2 -pipe -std=c11 \
            --target="$TARGET_TRIPLE" \
            --sysroot="$TARGET_SYSROOT" \
            -fuse-ld=lld \
            -DWINVER=0x0A00 \
            -D_WIN32_WINNT=0x0A00 \
            -DCURL_STATICLIB \
            -finput-charset=UTF-8 \
            -fexec-charset=UTF-8 \
            -Wall -Wextra -Wno-unused-parameter \
            $WIN_CFLAGS \
            "$SRC_FILE" \
            -o "dist/$APP_NAME-windows-arm64.exe" \
            $WIN_LIBS \
            -lws2_32 -lcrypt32 -lbcrypt -lwinpthread \
            -static -Wl,-s
          file "dist/$APP_NAME-windows-arm64.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: better-cf-ip-c-windows-arm64
          path: dist/better-cf-ip-c-windows-arm64.exe
          if-no-files-found: error

  release:
    name: Publish release
    needs: [build-linux-amd64, build-linux-docker, build-macos, build-windows-x86, build-windows-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble package
        run: |
          set -euo pipefail
          mkdir -p release package/bin
          find artifacts -maxdepth 3 -type f -print0 | while IFS= read -r -d '' file; do
            name="$(basename "$file")"
            cp "$file" "release/$name"
            cp "$file" "package/bin/$name"
          done
          cp "$SRC_FILE" Makefile README.md package/
          [ -f locations.json ] && cp locations.json package/
          (cd package && zip -r ../release/better-cf-ip-c-release.zip .)
          (cd release && sha256sum * > sha256sums.txt)

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
