name: Build qrencode Linux multi-platform

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            artifact: qrencode-linux-amd64
            packages: gcc libc6-dev libqrencode4
            cc: gcc
            cflags: ""
            ldflags: "-ldl"
            smoke_test: true
          - name: linux-386
            artifact: qrencode-linux-386
            packages: gcc-i686-linux-gnu libc6-dev-i386-cross
            cc: i686-linux-gnu-gcc
            cflags: ""
            ldflags: "-ldl"
          - name: linux-armv5
            artifact: qrencode-linux-armv5
            packages: gcc-arm-linux-gnueabi libc6-dev-armel-cross
            cc: arm-linux-gnueabi-gcc
            cflags: "-march=armv5te"
            ldflags: "-ldl"
          - name: linux-armv6
            artifact: qrencode-linux-armv6
            packages: gcc-arm-linux-gnueabihf libc6-dev-armhf-cross
            cc: arm-linux-gnueabihf-gcc
            cflags: "-marm -march=armv6 -mfpu=vfp -mfloat-abi=hard"
            ldflags: "-ldl"
          - name: linux-armv7
            artifact: qrencode-linux-armv7
            packages: gcc-arm-linux-gnueabihf libc6-dev-armhf-cross
            cc: arm-linux-gnueabihf-gcc
            cflags: "-marm -march=armv7-a -mfpu=vfpv3-d16 -mfloat-abi=hard"
            ldflags: "-ldl"
          - name: linux-arm64
            artifact: qrencode-linux-arm64
            packages: gcc-aarch64-linux-gnu libc6-dev-arm64-cross
            cc: aarch64-linux-gnu-gcc
            cflags: ""
            ldflags: "-ldl"
          - name: linux-mips
            artifact: qrencode-linux-mips
            packages: gcc-mips-linux-gnu libc6-dev-mips-cross
            cc: mips-linux-gnu-gcc
            cflags: ""
            ldflags: "-ldl"
          - name: linux-mipsel
            artifact: qrencode-linux-mipsel
            packages: gcc-mipsel-linux-gnu libc6-dev-mipsel-cross
            cc: mipsel-linux-gnu-gcc
            cflags: ""
            ldflags: "-ldl"
          - name: linux-mips64
            artifact: qrencode-linux-mips64
            packages: gcc-mips64-linux-gnuabi64 libc6-dev-mips64-cross
            cc: mips64-linux-gnuabi64-gcc
            cflags: ""
            ldflags: "-ldl"
          - name: linux-mips64el
            artifact: qrencode-linux-mips64el
            packages: gcc-mips64el-linux-gnuabi64 libc6-dev-mips64el-cross
            cc: mips64el-linux-gnuabi64-gcc
            cflags: ""
            ldflags: "-ldl"
          - name: linux-ppc64
            artifact: qrencode-linux-ppc64
            packages: gcc-powerpc64-linux-gnu libc6-dev-ppc64-cross
            cc: powerpc64-linux-gnu-gcc
            cflags: ""
            ldflags: "-ldl"
          - name: linux-ppc64le
            artifact: qrencode-linux-ppc64le
            packages: gcc-powerpc64le-linux-gnu libc6-dev-ppc64el-cross
            cc: powerpc64le-linux-gnu-gcc
            cflags: ""
            ldflags: "-ldl"
          - name: linux-riscv64
            artifact: qrencode-linux-riscv64
            packages: gcc-riscv64-linux-gnu libc6-dev-riscv64-cross
            cc: riscv64-linux-gnu-gcc
            cflags: ""
            ldflags: "-ldl"
          - name: linux-s390x
            artifact: qrencode-linux-s390x
            packages: gcc-s390x-linux-gnu libc6-dev-s390x-cross
            cc: s390x-linux-gnu-gcc
            cflags: ""
            ldflags: "-ldl"
          - name: linux-loongarch64
            artifact: qrencode-linux-loongarch64
            packages: ""
            zig_target: loongarch64-linux-gnu
            cflags: ""
            ldflags: "-ldl"
            use_zig: true
            experimental: true
    env:
      SOURCE_FILE: main.c
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cross compiler
        if: ${{ !matrix.use_zig }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ${{ matrix.packages }} file ca-certificates

      - name: Setup Zig for loongarch64
        if: ${{ matrix.use_zig }}
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Install common tools for Zig build
        if: ${{ matrix.use_zig }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends file ca-certificates

      - name: Build Linux binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          if [ ! -f "$SOURCE_FILE" ]; then echo "SOURCE_FILE '$SOURCE_FILE' not found" >&2; exit 1; fi
          if [ "${{ matrix.use_zig || false }}" = "true" ]; then
            zig cc -target ${{ matrix.zig_target }} -O2 -pipe -std=c99 \
              -Wall -Wextra ${{ matrix.cflags }} \
              "$SOURCE_FILE" -o "dist/${{ matrix.artifact }}" \
              ${{ matrix.ldflags }} -s
          else
            ${{ matrix.cc }} -O2 -pipe -std=c99 \
              -Wall -Wextra ${{ matrix.cflags }} \
              "$SOURCE_FILE" -o "dist/${{ matrix.artifact }}" \
              ${{ matrix.ldflags }} -s
          fi
          chmod +x "dist/${{ matrix.artifact }}"
          file "dist/${{ matrix.artifact }}"

      - name: Smoke test native binary
        if: ${{ matrix.smoke_test }}
        shell: bash
        run: |
          set -euo pipefail
          "dist/${{ matrix.artifact }}" -level H -qz 2 -compact=false "https://example.com" > /tmp/qrencode-output.txt
          test -s /tmp/qrencode-output.txt

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error
          compression-level: 0
