name: Build cfnat C

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            cc: gcc
            artifact: cfnat-linux-amd64
            packages: ""
            cflags: "-O2 -Wall -Wextra -std=c11 -static"

          - name: linux-arm64
            cc: aarch64-linux-gnu-gcc
            artifact: cfnat-linux-arm64
            packages: "gcc-aarch64-linux-gnu"
            cflags: "-O2 -Wall -Wextra -std=c11 -static"

          - name: linux-armv7
            cc: arm-linux-gnueabihf-gcc
            artifact: cfnat-linux-armv7
            packages: "gcc-arm-linux-gnueabihf"
            cflags: "-O2 -Wall -Wextra -std=c11 -march=armv7-a -mfpu=vfpv3-d16 -mfloat-abi=hard -static"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cross compiler
        if: matrix.packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          ${{ matrix.cc }} ${{ matrix.cflags }} -pthread -s -o dist/${{ matrix.artifact }} cfnat.c
          chmod +x dist/${{ matrix.artifact }}
          file dist/${{ matrix.artifact }}

          if file dist/${{ matrix.artifact }} | grep -qi "dynamically linked"; then
            echo "ERROR: dist/${{ matrix.artifact }} is dynamically linked"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Prepare release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find dist -type f -print0 | while IFS= read -r -d '' f; do
            name="$(basename "$f")"
            cp "$f" "release/$name"
            chmod +x "release/$name"
          done
          cd release
          sha256sum * > sha256sums.txt
          ls -lh

      - name: Upload GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
