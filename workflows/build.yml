name: Build cfnat C

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64-glibc
            runner: ubuntu-latest
            source: cfnat_linux.c
            artifact: cfnat-linux-amd64
            cc: gcc
            libs: "-pthread -lresolv"
            setup: "sudo apt-get update && sudo apt-get install -y build-essential"
          - name: linux-386-glibc
            runner: ubuntu-latest
            source: cfnat_linux.c
            artifact: cfnat-linux-386
            cc: gcc
            cflags: "-m32"
            libs: "-pthread -lresolv"
            setup: "sudo apt-get update && sudo apt-get install -y gcc-multilib libc6-dev-i386"
          - name: linux-arm64-glibc
            runner: ubuntu-latest
            source: cfnat_linux.c
            artifact: cfnat-linux-arm64
            cc: aarch64-linux-gnu-gcc
            libs: "-pthread -lresolv"
            setup: "sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu"
          - name: linux-amd64-musl
            runner: ubuntu-latest
            source: cfnat_linux.c
            artifact: cfnat-linux-amd64-musl
            cc: x86_64-linux-musl-gcc
            libs: "-pthread -static -s"
            setup: "sudo apt-get update && sudo apt-get install -y musl-tools"
          - name: darwin-amd64
            runner: macos-latest
            source: cfnat_macos.c
            artifact: cfnat-darwin-amd64
            cc: clang
            cflags: "-arch x86_64 -mmacosx-version-min=10.13"
            libs: "-pthread -lresolv"
            setup: "true"
          - name: darwin-arm64
            runner: macos-latest
            source: cfnat_macos.c
            artifact: cfnat-darwin-arm64
            cc: clang
            cflags: "-arch arm64 -mmacosx-version-min=11.0"
            libs: "-pthread -lresolv"
            setup: "true"
          - name: windows-amd64
            runner: ubuntu-latest
            source: cfnat_windows.c
            artifact: cfnat-windows-amd64.exe
            cc: x86_64-w64-mingw32-gcc
            cflags: "-D_WIN32_WINNT=0x0601"
            libs: "-lws2_32 -ldnsapi -lwinpthread -static -s"
            setup: "sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64"
          - name: windows-386
            runner: ubuntu-latest
            source: cfnat_windows.c
            artifact: cfnat-windows-386.exe
            cc: i686-w64-mingw32-gcc
            cflags: "-D_WIN32_WINNT=0x0601"
            libs: "-lws2_32 -ldnsapi -lwinpthread -static -s"
            setup: "sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-i686"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        shell: bash
        run: ${{ matrix.setup }}

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          ${CC} \
            -O2 -pipe -std=c11 ${CFLAGS:-} \
            -Wall -Wextra -Wno-unused-parameter \
            "${SOURCE_FILE}" \
            -o "dist/${ARTIFACT}" \
            ${LIBS}
          file "dist/${ARTIFACT}" || true
          case "${ARTIFACT}" in
            *.exe) ;;
            *) chmod +x "dist/${ARTIFACT}" ;;
          esac
        env:
          CC: ${{ matrix.cc }}
          CFLAGS: ${{ matrix.cflags }}
          SOURCE_FILE: ${{ matrix.source }}
          ARTIFACT: ${{ matrix.artifact }}
          LIBS: ${{ matrix.libs }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find dist -type f -print0 | while IFS= read -r -d '' file; do
            name="$(basename "$file")"
            cp "$file" "release/$name"
            case "$name" in
              *.exe) ;;
              *) chmod +x "release/$name" ;;
            esac
          done
          ls -lh release

      - name: Create source zip
        shell: bash
        run: |
          set -euo pipefail
          rm -rf zip-content
          mkdir -p zip-content/.github/workflows
          cp cfnat_linux.c cfnat_macos.c cfnat_windows.c README.md zip-content/
          cp .github/workflows/build.yml zip-content/.github/workflows/build.yml
          [ -f ips-v4 ] && cp ips-v4 zip-content/ || true
          [ -f ips-v6 ] && cp ips-v6 zip-content/ || true
          [ -f locations ] && cp locations zip-content/ || true
          cd zip-content
          zip -r ../release/cfnat-c-source.zip .

      - name: Create checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release
          sha256sum * > sha256sums.txt

      - name: Upload GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
